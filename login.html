<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FinTrack Pro</title>
    <script src="auth.js"></script>
    <script>
        // false = this is a public page
        checkAuth(false);
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f7f6; margin: 0; }
        .auth-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .form-group { margin-bottom: 15px; text-align: left; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; margin-top: 5px; }
        button { width: 100%; padding: 10px; background: #0056b3; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        a { color: #0056b3; text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p>Login to FinTrack Pro</p>
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="loginUsername" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" required>
            </div>
            <button type="submit">Login</button>
        </form>
        <p style="margin-top: 15px; font-size: 14px;">Don't have an account? <a href="register.html">Register here</a></p>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;

        // Use the new function from auth.js
        const attempt = loginUser(username, password);

        if (attempt.success) {
            window.location.replace('index.html');
        } else {
            alert(attempt.message); // Shows "Invalid username or password"
        }
    });
</script>
</body>
</html>
